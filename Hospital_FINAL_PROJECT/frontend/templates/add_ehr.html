{% extends 'base.html' %} {% block content %}

<style>
  .form-container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
  }

  .page-header {
    margin-bottom: 35px;
    padding-bottom: 20px;
    border-bottom: 2px solid #00ffff40;
  }

  .page-header h2 {
    color: #00ffff;
    font-size: 32px;
    font-weight: 700;
    margin: 0;
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
  }

  .page-header p {
    color: #b0bec5;
    font-size: 14px;
    margin: 8px 0 0 0;
  }

  .ehr-form {
    background: linear-gradient(135deg, #1f1f1f 0%, #262626 100%);
    border: 1px solid #00ffff40;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(0, 255, 255, 0.1);
  }

  .form-group {
    margin-bottom: 25px;
  }

  .form-group label {
    display: block;
    color: #00ffff;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px 15px;
    background-color: #121212;
    border: 1px solid #00ffff40;
    border-radius: 8px;
    color: #e0f7fa;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.3s ease;
    box-sizing: border-box;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
    background-color: #1a1a1a;
  }

  .form-group textarea {
    resize: vertical;
    min-height: 100px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-row .form-group {
    margin-bottom: 25px;
  }

  .info-box {
    background-color: #00ffff10;
    border-left: 4px solid #00ffff;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 25px;
    color: #b0bec5;
    font-size: 14px;
  }

  .info-box i {
    color: #00ffff;
    margin-right: 8px;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 30px;
    justify-content: space-between;
  }

  .btn-submit {
    flex: 1;
    background: linear-gradient(135deg, #00ffff, #00ccff);
    color: #000;
    border: none;
    padding: 14px 30px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
  }

  .btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0, 255, 255, 0.5);
  }

  .btn-cancel {
    flex: 1;
    background-color: #2d2d2d;
    color: #e0f7fa;
    border: 1px solid #00ffff40;
    padding: 14px 30px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-cancel:hover {
    background-color: #383838;
    border-color: #00ffff;
    text-decoration: none;
    color: #00ffff;
  }

  @media (max-width: 768px) {
    .form-container {
      padding: 15px;
    }

    .ehr-form {
      padding: 20px;
    }

    .page-header h2 {
      font-size: 24px;
    }

    .form-row {
      grid-template-columns: 1fr;
      gap: 0;
    }

    .form-actions {
      flex-direction: column;
    }
  }
</style>

<div class="form-container">
  <div class="page-header">
    <h2><i class="fas fa-plus-circle"></i> Add Medical Record</h2>
    <p>Create a new electronic health record for a patient</p>
  </div>

  <div class="info-box">
    <i class="fas fa-info-circle"></i>
    Fill in all details about the patient's medical visit, diagnosis, and
    treatment plan.
  </div>

  <form method="POST" class="ehr-form">
    <div class="form-row">
      <div class="form-group">
        <label for="patient_id"><i class="fas fa-user"></i> Patient</label>
        <select name="patient_id" id="patient_id" required>
          <option value="">-- Choose a Patient --</option>
          {% for p in patients %}
          <option value="{{ p.id }}">{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="doctor_id"
          ><i class="fas fa-user-md"></i> Select Doctor</label
        >
        <select name="doctor_id" id="doctor_id" required>
          <option value="">-- Choose a Doctor --</option>
          {% for d in doctors %}
          <option value="{{ d[0] }}">{{ d[1] }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="diagnosis"
        ><i class="fas fa-stethoscope"></i> Diagnosis</label
      >
      <textarea
        name="diagnosis"
        id="diagnosis"
        placeholder="Enter the patient's diagnosis..."
        required
      ></textarea>
    </div>

    <div class="form-group">
      <label for="treatment_plan"
        ><i class="fas fa-prescription-bottle"></i> Treatment Plan</label
      >
      <textarea
        name="treatment_plan"
        id="treatment_plan"
        placeholder="Enter the recommended treatment plan..."
      ></textarea>
    </div>

    <div class="form-group">
      <label for="medications"><i class="fas fa-pills"></i> Medications</label>
      <textarea
        name="medications"
        id="medications"
        placeholder="Enter prescribed medications and dosage..."
      ></textarea>
    </div>

    <div class="form-group">
      <label for="notes"
        ><i class="fas fa-notes-medical"></i> Additional Notes</label
      >
      <textarea
        name="notes"
        id="notes"
        placeholder="Enter any additional clinical notes or observations..."
      ></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit">
        <i class="fas fa-save"></i> Save Record
      </button>
      <a href="/ehr" class="btn-cancel">
        <i class="fas fa-arrow-left"></i> Back
      </a>
    </div>
  </form>
</div>

{% endblock %}
