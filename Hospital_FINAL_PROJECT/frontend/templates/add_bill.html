{% extends 'base.html' %} {% block title %}Create Bill - SmartMediHub{% endblock
%} {% block content %}

<div class="content-box mx-auto" style="max-width: 600px">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="mb-1">Generate New Bill</h2>
      <p class="text-muted mb-0">
        Enter the details and save the bill for the patient.
      </p>
    </div>
    <a class="btn btn-outline-light" href="/bills">
      <i class="fas fa-arrow-left me-2"></i>Back to Bills
    </a>
  </div>

  <form method="POST" class="row g-3">
    <div class="col-12">
      <label class="form-label">Patient</label>
      <select name="patient_id" class="form-control" required>
        <option value="">Select a patient</option>
        {% for patient in patients %}
        <option value="{{ patient.id }}">{{ patient.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Amount (₹)</label>
      <input
        name="amount"
        type="number"
        step="0.01"
        min="0"
        class="form-control"
        placeholder="e.g. 1500"
        required
      />
    </div>

    <div class="col-md-6">
      <label class="form-label">Date</label>
      <input type="date" name="date" class="form-control" required />
    </div>

    <div class="col-12 text-end">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save me-2"></i>Generate Bill
      </button>
    </div>
  </form>
</div>
{% endblock %}
