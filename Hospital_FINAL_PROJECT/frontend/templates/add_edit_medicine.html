{% extends 'base.html' %} {% block title %}{{ action }} Medicine -
SmartMediHub{% endblock %} {% block content %}
<div class="content-box glass-card mx-auto" style="max-width: 700px">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-1">{{ action }} Medicine</h2>
      <p class="text-muted mb-0">
        {{ action }} a medicine record for the pharmacy inventory.
      </p>
    </div>
    <a href="/admin/medicines" class="btn btn-outline-light">
      <i class="fas fa-arrow-left me-2"></i>Back to Inventory
    </a>
  </div>

  <form method="POST" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Medicine Name</label>
      <input
        name="name"
        class="form-control"
        value="{{ medicine[1] if medicine else '' }}"
        placeholder="e.g., Paracetamol"
        required />
    </div>

    <div class="col-md-6">
      <label class="form-label">Price (₹)</label>
      <input
        name="price"
        type="number"
        step="0.01"
        min="0"
        class="form-control"
        value="{{ medicine[2] if medicine else '' }}"
        placeholder="e.g., 99.50"
        required />
    </div>

    <div class="col-md-6">
      <label class="form-label">Stock Quantity</label>
      <input
        name="stock"
        type="number"
        min="0"
        class="form-control"
        value="{{ medicine[3] if medicine else '' }}"
        placeholder="Quantity"
        required />
    </div>

    <div class="col-md-6">
      <label class="form-label">Expiry Date</label>
      <input
        name="expiry_date"
        type="date"
        class="form-control"
        value="{{ medicine[4] if medicine else '' }}" />
    </div>

    <div class="col-12 text-end">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save me-2"></i>{{ action }} Medicine
      </button>
    </div>
  </form>
</div>

<style>
  body {
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("/static/Images/pharmacy_page.jpg");
    background-size: cover;
    background-attachment: fixed;
    background-repeat: no-repeat;
    filter: blur(5px);
    opacity: 0.85;
    z-index: -1;
  }

  .glass-card {
    background: rgba(15, 20, 30, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
  }

  .glass-card input,
  .glass-card select {
    background: rgba(255, 255, 255, 0.13);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.12);
  }

  .glass-card .form-label,
  .glass-card .btn {
    color: #ffffff;
  }
</style>
{% endblock %}
