{% extends 'base.html' %} {% block title %}Add Lab Test - SmartMediHub{%
endblock %} {% block content %}
<div class="content-box mx-auto" style="max-width: 600px">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="mb-1">Add Lab Test</h2>
      <p class="text-muted mb-0">
        Create a new lab test request for a patient.
      </p>
    </div>
    <a class="btn btn-outline-light" href="/lab-tests">
      <i class="fas fa-arrow-left me-2"></i>Back to Tests
    </a>
  </div>

  <form method="POST" class="row g-3">
    <div class="col-12">
      <label class="form-label">Patient</label>
      <select name="patient_id" class="form-select" required>
        <option value="" selected disabled>Select patient</option>
        {% for p in patients %}
        <option value="{{ p[0] }}">{{ p[1] }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-12">
      <label class="form-label">Test Type</label>
      <input
        name="test_type"
        class="form-control"
        placeholder="e.g., Blood Test"
        required />
    </div>

    <div class="col-12 text-end">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-plus me-2"></i>Add Test
      </button>
    </div>
  </form>
</div>

<style>
  body {
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("/static/Images/Laboratory-Test.webp");
    background-size: cover;
    background-attachment: fixed;
    background-repeat: no-repeat;
    filter: blur(5px);
    z-index: -1;
  }
</style>
{% endblock %}
