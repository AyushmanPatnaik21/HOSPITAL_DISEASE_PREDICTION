{% extends 'base.html' %} {% block content %}

<style>
  .form-container {
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
  }

  .page-header {
    margin-bottom: 35px;
    padding-bottom: 20px;
    border-bottom: 2px solid #00ffff40;
  }

  .page-header h2 {
    color: #00ffff;
    font-size: 32px;
    font-weight: 700;
    margin: 0;
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
  }

  .page-header p {
    color: #b0bec5;
    font-size: 14px;
    margin: 8px 0 0 0;
  }

  .doctor-form {
    background: linear-gradient(135deg, #1f1f1f 0%, #262626 100%);
    border: 1px solid #00ffff40;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(0, 255, 255, 0.1);
  }

  .form-group {
    margin-bottom: 25px;
  }

  .form-group label {
    display: block;
    color: #00ffff;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px 15px;
    background-color: #121212;
    border: 1px solid #00ffff40;
    border-radius: 8px;
    color: #e0f7fa;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.3s ease;
    box-sizing: border-box;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #00ffff;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
    background-color: #1a1a1a;
  }

  .form-group input::placeholder {
    color: #616161;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-row .form-group {
    margin-bottom: 25px;
  }

  .info-box {
    background-color: #00ffff10;
    border-left: 4px solid #00ffff;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 25px;
    color: #b0bec5;
    font-size: 14px;
  }

  .info-box i {
    color: #00ffff;
    margin-right: 8px;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 30px;
    justify-content: space-between;
  }

  .btn-submit {
    flex: 1;
    background: linear-gradient(135deg, #00ffff, #00ccff);
    color: #000;
    border: none;
    padding: 14px 30px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
  }

  .btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0, 255, 255, 0.5);
  }

  .btn-submit:active {
    transform: translateY(-1px);
  }

  .btn-cancel {
    flex: 1;
    background-color: #2d2d2d;
    color: #e0f7fa;
    border: 1px solid #00ffff40;
    padding: 14px 30px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-cancel:hover {
    background-color: #383838;
    border-color: #00ffff;
    text-decoration: none;
    color: #00ffff;
  }

  @media (max-width: 768px) {
    .form-container {
      padding: 15px;
    }

    .doctor-form {
      padding: 20px;
    }

    .page-header h2 {
      font-size: 24px;
    }

    .form-row {
      grid-template-columns: 1fr;
      gap: 0;
    }

    .form-actions {
      flex-direction: column;
    }
  }
</style>

<div class="form-container">
  <div class="page-header">
    <h2><i class="fas fa-user-plus"></i> Add a New Doctor</h2>
    <p>Fill in the doctor's information to add them to the system</p>
  </div>

  <div class="info-box">
    <i class="fas fa-lightbulb"></i>
    All fields are required. You can edit or delete doctor information later.
  </div>

  <form method="POST" class="doctor-form">
    <div class="form-row">
      <div class="form-group">
        <label for="name"><i class="fas fa-user"></i> Doctor Name</label>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="Enter doctor's full name"
          required />
      </div>

      <div class="form-group">
        <label for="specialization"
          ><i class="fas fa-stethoscope"></i> Specialization</label
        >
        <input
          type="text"
          name="specialization"
          id="specialization"
          placeholder="e.g., Cardiology, Pediatrics"
          required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="contact"><i class="fas fa-phone"></i> Contact Number</label>
        <input
          type="tel"
          name="contact"
          id="contact"
          placeholder="Enter phone number"
          required />
      </div>

      <div class="form-group">
        <label for="availability"
          ><i class="fas fa-calendar-alt"></i> Availability</label
        >
        <input
          type="text"
          name="availability"
          id="availability"
          placeholder="e.g., Mon-Fri 9AM-5PM"
          required />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit">
        <i class="fas fa-save"></i> Add Doctor
      </button>
      <a href="/doctors" class="btn-cancel">
        <i class="fas fa-arrow-left"></i> Back
      </a>
    </div>
  </form>
</div>

{% endblock %}
