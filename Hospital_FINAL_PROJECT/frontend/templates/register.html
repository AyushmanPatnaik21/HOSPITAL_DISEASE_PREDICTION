{% extends 'base.html' %} {% block content %}

<!-- Font Awesome -->
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
  .login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: black;
  }

  .login-box {
    display: flex;
    width: 800px;
    max-width: 90%;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
  }

  /* LEFT PANEL */
  .left-panel {
    flex: 1;
    background: #6c63ff;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
  }

  .left-panel h2 {
    margin-bottom: 10px;
  }

  .left-panel p {
    margin-bottom: 20px;
  }

  .login-btn-link {
    display: inline-block;
    padding: 10px 20px;
    border: 1px solid white;
    color: white;
    border-radius: 20px;
    text-decoration: none;
    transition: 0.3s;
  }

  .login-btn-link:hover {
    background: white;
    color: #6c63ff;
  }

  /* RIGHT PANEL */
  .right-panel {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .right-panel h2 {
    margin-bottom: 20px;
  }

  .input-group {
    margin-bottom: 15px;
    position: relative;
  }

  .input-group input,
  .input-group select {
    width: 100%;
    padding: 10px 10px 10px 40px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  .input-group i {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
  }

  .signup-btn {
    width: 100%;
    padding: 10px;
    background: #6c63ff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
  }

  .signup-btn:hover {
    background: #5750d4;
  }

  .flash-message {
    background-color: #d4edda;
    color: #155724;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
  }

  .password-feedback {
    margin-bottom: 15px;
    color: #333;
    background: #f5f7ff;
    border: 1px solid #ccd8ff;
    border-radius: 8px;
    padding: 12px;
  }

  .password-feedback ul {
    margin: 0;
    padding-left: 20px;
  }

  .password-feedback li {
    margin-bottom: 6px;
  }

  .password-feedback .valid {
    color: #2d7a2d;
    font-weight: 600;
  }

  @media (max-width: 768px) {
    .login-box {
      flex-direction: column;
    }
  }
</style>

<div class="login-container">
  <div class="login-box">
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <h2>Welcome Back!</h2>
      <p>Already have an account?</p>
      <a href="/login" class="login-btn-link">Login</a>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <h2>Register</h2>

      {% with messages = get_flashed_messages() %} {% if messages %}
      <div class="flash-message">
        {% for msg in messages %}
        <p>{{ msg }}</p>
        {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <!-- REGISTER FORM -->
      <form method="POST" action="/register">
        <div class="input-group">
          <input type="text" name="name" required placeholder="Full Name" />
          <i class="fas fa-user"></i>
        </div>

        <div class="input-group">
          <input type="email" name="email" required placeholder="Email" />
          <i class="fas fa-envelope"></i>
        </div>

        <div class="input-group">
          <input
            type="password"
            name="password"
            required
            placeholder="Password"
            id="passwordInput"
            data-bs-toggle="tooltip"
            data-bs-placement="right"
            title="Use 8–16 characters with uppercase, lowercase, number, and symbol." />
          <i class="fas fa-lock"></i>
        </div>

        <div
          id="password-feedback"
          class="password-feedback"
          style="display: none">
          <!-- Errors will be shown here -->
        </div>

        <div class="input-group">
          <select name="role" required>
            <option value="">Select Role</option>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
            <option value="admin">Admin</option>
          </select>
          <i class="fas fa-user-tag"></i>
        </div>

        <button type="submit" class="signup-btn">Register</button>
      </form>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    // Initialize Bootstrap tooltips
    var tooltipTriggerList = [].slice.call(
      document.querySelectorAll('[data-bs-toggle="tooltip"]'),
    );
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl);
    });

    const passwordInput = document.getElementById("passwordInput");
    const nameInput = document.querySelector('input[name="name"]');
    const emailInput = document.querySelector('input[name="email"]');
    const submitButton = document.querySelector(".signup-btn");
    const feedback = document.getElementById("password-feedback");

    const commonWords = [
      "password",
      "123456",
      "12345678",
      "qwerty",
      "abc123",
      "111111",
      "letmein",
      "admin",
      "welcome",
      "login",
      "pass",
      "user",
    ];

    function validatePassword(password, name, email) {
      const errors = [];
      const trimmed = password.trim();
      const lower = trimmed.toLowerCase();
      const lowerName = (name || "").trim().toLowerCase();
      const lowerEmail = (email || "").trim().toLowerCase();

      if (trimmed.length < 8 || trimmed.length > 16) {
        errors.push("Password must be 8–16 characters long.");
      }
      if (!/[A-Z]/.test(trimmed)) {
        errors.push("Add at least one uppercase letter.");
      }
      if (!/[a-z]/.test(trimmed)) {
        errors.push("Add at least one lowercase letter.");
      }
      if (!/\d/.test(trimmed)) {
        errors.push("Add at least one number.");
      }
      if (!/[!@#$%^&*(),.?":{}|<>]/.test(trimmed)) {
        errors.push("Add at least one special character.");
      }
      if (lowerName && lower === lowerName) {
        errors.push("Password cannot be the same as your name.");
      }
      if (lowerEmail && lower === lowerEmail) {
        errors.push("Password cannot be the same as your email.");
      }
      if (commonWords.some((word) => lower.includes(word))) {
        errors.push('Avoid common words like "password" or "123456".');
      }
      if (/(.)\1\1/.test(trimmed)) {
        errors.push("Avoid repeating the same character three or more times.");
      }
      return errors;
    }

    function updateFeedback() {
      const errors = validatePassword(
        passwordInput.value,
        nameInput.value,
        emailInput.value,
      );
      if (errors.length === 0 && passwordInput.value.trim() !== "") {
        feedback.innerHTML =
          '<p class="valid">Great! Your password looks strong.</p>';
        feedback.style.display = "block";
        submitButton.disabled = false;
        submitButton.style.opacity = "1";
      } else if (errors.length > 0) {
        const list =
          "<ul>" +
          errors.map((error) => `<li>${error}</li>`).join("") +
          "</ul>";
        feedback.innerHTML = list;
        feedback.style.display = "block";
        submitButton.disabled = true;
        submitButton.style.opacity = "0.7";
      } else {
        feedback.style.display = "none";
        submitButton.disabled = true;
        submitButton.style.opacity = "0.7";
      }
    }

    passwordInput.addEventListener("input", updateFeedback);
    nameInput.addEventListener("input", updateFeedback);
    emailInput.addEventListener("input", updateFeedback);
    updateFeedback();
  });
</script>

{% endblock %}
