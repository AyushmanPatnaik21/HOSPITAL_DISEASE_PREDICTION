{% extends 'base.html' %} {% block title %}Add Lab Test Type - SmartMediHub{%
endblock %} {% block content %}
<div class="content-box glass-card mx-auto" style="max-width: 600px">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-1">Add Lab Test Type</h2>
      <p class="text-muted mb-0">
        Create a new lab test that patients can book
      </p>
    </div>
    <a class="btn btn-outline-light" href="/admin/lab-tests">
      <i class="fas fa-arrow-left me-2"></i>Back to Tests
    </a>
  </div>

  <form method="POST" class="row g-3">
    <div class="col-12">
      <label class="form-label">Test Name</label>
      <input
        type="text"
        name="test_name"
        class="form-control"
        placeholder="e.g., Complete Blood Count"
        required />
    </div>

    <div class="col-12">
      <label class="form-label">Price ($)</label>
      <input
        type="number"
        name="price"
        class="form-control"
        step="0.01"
        min="0"
        placeholder="0.00"
        required />
    </div>

    <div class="col-12">
      <label class="form-label">Description</label>
      <textarea
        name="description"
        class="form-control"
        rows="4"
        placeholder="Describe what this test includes and what it checks for..."></textarea>
    </div>

    <div class="col-12 text-end">
      <button type="submit" class="btn btn-primary btn-lg">
        <i class="fas fa-plus me-2"></i>Add Test Type
      </button>
    </div>
  </form>
</div>

<style>
  body {
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("/static/Images/Laboratory-Test.webp");
    background-size: cover;
    background-attachment: fixed;
    background-repeat: no-repeat;
    filter: blur(5px);
    z-index: -1;
  }

  .glass-card {
    background: rgba(10, 16, 26, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
  }

  .glass-card .form-control,
  .glass-card .form-select,
  .glass-card .btn,
  .glass-card .form-text {
    color: #ffffff;
  }

  .glass-card .form-control,
  .glass-card .form-select {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.14);
  }
</style>
{% endblock %}
